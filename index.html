<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NTL Library Room FL.16</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Kanit',sans-serif;background:#0f172a;color:#e2e8f0}
.header{padding:14px;background:linear-gradient(135deg,#22d3ee,#6366f1)}
.title{font-size:20px;color:#000;font-weight:600}
.contact{font-size:12px;color:#000}
.top{display:flex;justify-content:space-between;align-items:center}
.right{display:flex;gap:8px}
button{padding:8px;border:none;border-radius:8px;background:#6366f1;color:#fff;cursor:pointer}
.conn{padding:4px 8px;border-radius:8px;background:#ef4444}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;padding:10px}
.day{background:#020617;padding:8px;border-radius:10px}
.status{padding:4px;border-radius:6px;text-align:center}
.available{background:#00ffa6;color:#000}
.partial{background:#facc15;color:#000}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,.7)}
.box{background:#020617;padding:16px;border-radius:10px;width:300px}
input{width:100%;padding:8px;margin-bottom:8px;border:none;border-radius:6px;background:#1e293b;color:#fff}
</style>
</head>
<body>

<div class="header">
<div class="top">
<div>
<div class="title">📊 ข้อมูลการใช้งานห้องสมุด</div>
<div class="contact">Mail : BSCS_GNR | Tel : 3262-3264</div>
</div>
<div class="right">
<div id="clock"></div>
<div id="conn" class="conn">Offline</div>
<button onclick="openBooking()">จอง</button>
<button onclick="openLogin()">Admin</button>
</div>
</div>
<div id="monthLabel"></div>
</div>

<div id="calendar" class="calendar"></div>

<!-- BOOKING -->
<div id="bookingModal" class="modal"><div class="box">
<input id="date" type="date">
<input id="meeting" placeholder="หัวข้อ">
<input id="detail" placeholder="รายละเอียด">
<input id="userName" placeholder="ชื่อ">
<input id="phone" placeholder="เบอร์">
<button onclick="submitBooking()">บันทึก</button>
<button onclick="closeModal('bookingModal')">ปิด</button>
</div></div>

<!-- ADMIN -->
<div id="adminModal" class="modal"><div class="box">
<div id="adminDetail"></div>
<button onclick="updateStatus('approved')">Approve</button>
<button onclick="updateStatus('rejected')">Reject</button>
<button onclick="updateStatus('cancel')">Cancel</button>
<button onclick="closeModal('adminModal')">ปิด</button>
</div></div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbx_Nop30QZjN6yMa8SzjhUrzMCaHD8qKqodsSumGlBv2dnEIWMsH8OYZZ-K9-k68GFh/exec";
let data=[];
let isLoading=false;
let isAdmin=false;
let currentID=null;

// clock
setInterval(()=>{
 document.getElementById('clock').innerText=new Date().toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok'});
},1000);

function setConn(s){
 const el=document.getElementById('conn');
 el.innerText=s?'Online':'Offline';
 el.style.background=s?'#22c55e':'#ef4444';
}

function formatDate(d){
 return new Date(d).toISOString().split('T')[0];
}

async function fetchData(){
 if(isLoading) return;
 isLoading=true;
 try{
  const res=await fetch(GAS_URL+'?t='+Date.now());
  const json=await res.json();
  data=json;
  setConn(true);
  renderCalendar();
 }catch(e){
  setConn(false);
 }
 isLoading=false;
}

function renderCalendar(){
 const cal=document.getElementById('calendar');
 cal.innerHTML='';
 const now=new Date();
 document.getElementById('monthLabel').innerText=`เดือน ${now.toLocaleDateString('th-TH',{month:'long',year:'numeric'})}`;
 const days=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

 for(let i=1;i<=days;i++){
  const d=new Date(now.getFullYear(),now.getMonth(),i);
  const ds=d.toISOString().split('T')[0];
  const dayData=data.filter(x=>formatDate(x.Date)===ds);

  const approved=dayData.some(x=>x.Status?.toLowerCase()==='approved');

  cal.innerHTML+=`<div class="day" onclick="openDay('${ds}')">
  <div>${i}</div>
  <div class="status ${approved?'partial':'available'}">${approved?'มีการจอง':'ว่าง'}</div>
  </div>`;
 }
}

function openDay(date){
 if(!isAdmin) return;
 const d=data.find(x=>formatDate(x.Date)===date);
 if(!d) return;
 currentID=d.ID;
 document.getElementById('adminDetail').innerHTML=`${d.subject}<br>${d.user}`;
 document.getElementById('adminModal').style.display='flex';
}

function openBooking(){
 document.getElementById('bookingModal').style.display='flex';
}

async function submitBooking(){
 await fetch(GAS_URL,{method:'POST',body:JSON.stringify({
  action:'create',
  data:{
   Date:new Date(document.getElementById('date').value).toLocaleDateString('en-GB'),
   'Start Time':'08:00',
   StopTime:'12:00',
   subject:document.getElementById('meeting').value,
   detail:document.getElementById('detail').value,
   user:document.getElementById('userName').value,
   phone:document.getElementById('phone').value
  }
 })});
 closeModal('bookingModal');
 fetchData();
}

function updateStatus(status){
 fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'update',data:{ID:currentID},status})});
 closeModal('adminModal');
 fetchData();
}

function openLogin(){isAdmin=true;alert('Admin mode');}
function closeModal(id){document.getElementById(id).style.display='none';}

// init
renderCalendar();
fetchData();
setInterval(fetchData,5000);
</script>
</body>
</html>
