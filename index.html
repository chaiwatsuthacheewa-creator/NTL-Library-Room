<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTL Library Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050b14;
            --panel-bg: rgba(13, 22, 38, 0.7);
            --neon-blue: #00f3ff;
            --neon-green: #00ff66;
            --neon-yellow: #ffcc00;
            --neon-red: #ff003c;
            --text-main: #e2e8f0;
        }
        
        body { margin: 0; padding: 20px; font-family: 'Kanit', sans-serif; background: var(--bg-color); color: var(--text-main); background-image: radial-gradient(circle at 50% 0%, #112240 0%, transparent 70%); }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--panel-bg); border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 12px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); backdrop-filter: blur(10px); margin-bottom: 20px; }
        .title { margin: 0; font-size: 24px; color: var(--neon-blue); text-shadow: 0 0 10px rgba(0,243,255,0.5); font-weight: 600; letter-spacing: 1px; }
        .subtitle { font-size: 13px; color: #8892b0; margin-top: 5px; }
        
        /* Layout Grid */
        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; align-items: start; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        
        .panel { background: var(--panel-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 20px; backdrop-filter: blur(10px); }
        .panel-title { color: var(--neon-blue); font-size: 18px; margin-top: 0; border-bottom: 1px solid rgba(0,243,255,0.2); padding-bottom: 10px; margin-bottom: 15px; }

        /* Calendar */
        .calendar-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-header { text-align: center; color: #8892b0; font-size: 14px; margin-bottom: 5px; }
        .day-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 10px; min-height: 80px; cursor: pointer; transition: all 0.3s; position: relative; display: flex; flex-direction: column; justify-content: space-between; }
        .day-card:hover { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0,243,255,0.2); transform: translateY(-2px); }
        .day-num { font-size: 18px; font-weight: 600; }
        
        /* Status Indicators */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-text { font-size: 12px; text-align: right; }
        
        .state-empty { color: #5a6b8a; }
        .state-pending { border-color: rgba(255,204,0,0.5); background: rgba(255,204,0,0.05); }
        .state-pending .status-text { color: var(--neon-yellow); text-shadow: 0 0 5px var(--neon-yellow); }
        .state-approved { border-color: rgba(0,255,102,0.5); background: rgba(0,255,102,0.05); }
        .state-approved .status-text { color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }

        /* Details List */
        .detail-item { background: rgba(0,0,0,0.3); border-left: 3px solid var(--neon-blue); padding: 12px; border-radius: 6px; margin-bottom: 10px; font-size: 14px; }
        .detail-item.approved { border-color: var(--neon-green); }
        .detail-item.pending { border-color: var(--neon-yellow); }
        .empty-state { text-align: center; color: #5a6b8a; padding: 30px 0; font-style: italic; }

        /* Modal & Forms */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: #0d1626; padding: 25px; border-radius: 12px; width: 90%; max-width: 450px; border: 1px solid var(--neon-blue); box-shadow: 0 0 30px rgba(0,243,255,0.15); }
        input, select { width: 100%; padding: 10px; margin: 8px 0 15px; border-radius: 6px; border: 1px solid #2a3b5c; background: #050b14; color: white; box-sizing: border-box; font-family: 'Kanit'; }
        input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 8px rgba(0,243,255,0.3); }
        
        .btn { padding: 10px 15px; border-radius: 6px; border: none; font-family: 'Kanit'; font-weight: 600; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; font-size: 13px; }
        .btn-primary { background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .btn-primary:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        .btn-approve { background: transparent; color: var(--neon-green); border: 1px solid var(--neon-green); width: 100%; margin-bottom: 10px;}
        .btn-approve:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }
        .btn-cancel { background: transparent; color: #8892b0; border: 1px solid #8892b0; }
        .btn-cancel:hover { background: #8892b0; color: #000; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 class="title">SYS // NTL_LIBRARY_FL16</h1>
        <div class="subtitle">TEAM: BSCS_GNR | CONTACT: 3262-3264 | STATUS: <span id="connStatus" style="color:var(--neon-green)">ONLINE</span></div>
    </div>
    <div style="text-align: right; display: flex; gap: 10px; align-items: center;">
        <div id="clock" style="font-size: 20px; color: var(--neon-blue); font-weight: 300; margin-right: 15px;">00:00</div>
        <button class="btn btn-primary" onclick="openBooking()">+ จองห้อง</button>
        <button class="btn btn-primary" style="border-color: var(--neon-red); color: var(--neon-red);" onclick="toggleAdmin()">ADMIN</button>
    </div>
</div>

<div class="dashboard">
    <div class="panel">
        <div class="calendar-header">
            <h2 class="panel-title" style="margin:0; border:none;" id="monthLabel">Loading...</h2>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="panel">
        <h2 class="panel-title">รายละเอียดการใช้งาน</h2>
        <div id="selectedDateLabel" style="color: #8892b0; margin-bottom: 15px; font-size: 14px;">คลิกที่วันที่ในปฏิทินเพื่อดูข้อมูล</div>
        <div id="detailsContainer">
            <div class="empty-state">กรุณาเลือกวันที่</div>
        </div>
    </div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--neon-blue); margin-top: 0;">DATA INPUT // จองห้องสมุด</h3>
        <label>วันที่:</label>
        <input type="date" id="formDate">
        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label>เริ่ม:</label><input type="time" id="startTime" value="09:00"></div>
            <div style="flex:1"><label>ถึง:</label><input type="time" id="stopTime" value="10:00"></div>
        </div>
        <label>หัวข้อ:</label><input type="text" id="formSubject" placeholder="เช่น ประชุมสรุปโปรเจกต์">
        <label>รายละเอียด:</label><input type="text" id="formDetail" placeholder="...">
        <label>ผู้จอง:</label><input type="text" id="formUser" placeholder="ชื่อ-นามสกุล หรือ ทีม">
        <label>เบอร์โทร:</label><input type="text" id="formPhone" placeholder="Ext. หรือ เบอร์มือถือ">
        
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn btn-primary" style="flex: 2;" onclick="submitBooking()" id="submitBtn">ยืนยันการจอง</button>
            <button class="btn btn-cancel" style="flex: 1;" onclick="closeModal('bookingModal')">ยกเลิก</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "YOUR_APPS_SCRIPT_URL"; // *** ใส่ URL ตรงนี้ ***
    let bookings = [];
    let isAdmin = false;

    // นาฬิกา
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }, 1000);

    const dayNames = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];

    async function fetchData() {
        try {
            const res = await fetch(API_URL);
            bookings = await res.json();
            renderCalendar();
            document.getElementById('connStatus').innerText = "SYNCED";
            document.getElementById('connStatus').style.color = "var(--neon-green)";
        } catch (e) { 
            document.getElementById('connStatus').innerText = "OFFLINE";
            document.getElementById('connStatus').style.color = "var(--neon-red)";
        }
    }

    function renderCalendar() {
        const cal = document.getElementById('calendarGrid');
        cal.innerHTML = '';
        
        // ใส่หัววัน
        dayNames.forEach(d => {
            cal.innerHTML += `<div class="day-header">${d}</div>`;
        });

        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        document.getElementById('monthLabel').innerText = now.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' }).toUpperCase();
        
        // หาวันแรกของเดือนว่าตรงกับวันอะไร เพื่อเว้นช่องว่าง
        const firstDayIndex = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // เติมช่องว่างด้านหน้า
        for(let i=0; i<firstDayIndex; i++) { cal.innerHTML += `<div></div>`; }

        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const dayData = bookings.filter(b => b.Date && b.Date.split('T')[0] === dateStr);
            
            let cardClass = 'day-card';
            let statusHtml = '<div class="status-text state-empty">ว่าง</div>';

            const hasApproved = dayData.some(d => d.Status === 'approved');
            const hasPending = dayData.some(d => d.Status === 'pending');

            if (hasApproved) { 
                cardClass += ' state-approved'; 
                statusHtml = `<div class="status-text">🟢 อนุมัติแล้ว</div>`;
            } else if (hasPending) { 
                cardClass += ' state-pending'; 
                statusHtml = `<div class="status-text">🟡 รอตรวจสอบ</div>`;
            }

            const card = document.createElement('div');
            card.className = cardClass;
            card.innerHTML = `
                <div class="day-num">${i}</div>
                ${statusHtml}
            `;
            card.onclick = () => showDetails(dateStr, dayData, i);
            cal.appendChild(card);
        }
    }

    function showDetails(dateStr, dayData, dayNum) {
        const container = document.getElementById('detailsContainer');
        document.getElementById('selectedDateLabel').innerText = `ข้อมูลของวันที่: ${dayNum} ${document.getElementById('monthLabel').innerText}`;
        
        if (dayData.length === 0) {
            container.innerHTML = `<div class="empty-state">ไม่มีคิวการใช้งานในวันนี้<br><br><button class="btn btn-primary" onclick="openBookingWithDate('${dateStr}')">จองเวลานี้</button></div>`;
            return;
        }

        container.innerHTML = '';
        dayData.sort((a,b) => a['Start Time'].localeCompare(b['Start Time'])).forEach(b => {
            const statusColor = b.Status === 'approved' ? 'approved' : 'pending';
            const statusText = b.Status === 'approved' ? '🟢 อนุมัติแล้ว' : '🟡 รออนุมัติ';
            
            let adminBtns = '';
            if (isAdmin) {
                adminBtns = `
                <div style="margin-top: 10px; display:flex; gap:5px;">
                    <button class="btn btn-approve" onclick="updateStatus('${b.ID}', 'approved')">APPROVE</button>
                    <button class="btn btn-primary" style="border-color:var(--neon-red); color:var(--neon-red); width:100%" onclick="updateStatus('${b.ID}', 'rejected')">REJECT</button>
                </div>`;
            }

            container.innerHTML += `
                <div class="detail-item ${statusColor}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <strong style="color:var(--neon-blue)">${b['Start Time']} - ${b.StopTime}</strong>
                        <span style="font-size:12px;">${statusText}</span>
                    </div>
                    <b>${b.Subject}</b><br>
                    <span style="color:#8892b0; font-size:12px;">โดย: ${b.User} (โทร: ${b.Phone.replace(/'/g,'')})</span>
                    ${adminBtns}
                </div>
            `;
        });
    }

    async function submitBooking() {
        const btn = document.getElementById('submitBtn');
        const data = {
            action: 'create',
            Date: document.getElementById('formDate').value,
            startTime: document.getElementById('startTime').value,
            stopTime: document.getElementById('stopTime').value,
            subject: document.getElementById('formSubject').value,
            detail: document.getElementById('formDetail').value,
            user: document.getElementById('formUser').value,
            phone: document.getElementById('formPhone').value
        };

        if (!data.Date || !data.subject || !data.user) return alert("โปรดกรอกข้อมูลสำคัญให้ครบถ้วน");

        btn.innerText = "PROCESSING...";
        btn.disabled = true;

        try {
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify(data)
            });
            const result = await res.json();
            
            if (result.status === 'error') {
                alert(result.msg); // แจ้งเตือนเวลาซ้ำ
            } else {
                alert("ส่งคำขอสำเร็จ! ระบบกำลังรอการยืนยันจาก Admin");
                closeModal('bookingModal');
                fetchData();
            }
        } catch (e) {
            alert("Error: ขัดข้องในการส่งข้อมูล");
        } finally {
            btn.innerText = "ยืนยันการจอง";
            btn.disabled = false;
        }
    }

    async function updateStatus(id, status) {
        if(!confirm(`ยืนยันการเปลี่ยนสถานะเป็น ${status.toUpperCase()}?`)) return;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'update', id: id, status: status }) });
        fetchData();
        document.getElementById('detailsContainer').innerHTML = `<div class="empty-state">กำลังอัปเดตข้อมูล...</div>`;
    }

    function openBooking() { document.getElementById('bookingModal').style.display = 'flex'; }
    function openBookingWithDate(d) { document.getElementById('formDate').value = d; openBooking(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleAdmin() { 
        isAdmin = !isAdmin; 
        alert(isAdmin ? "SYS: ADMIN MODE ONLINE\nสามารถกด Approve/Reject ได้ที่แผงรายละเอียดด้านขวา" : "SYS: ADMIN MODE OFFLINE"); 
        document.getElementById('detailsContainer').innerHTML = `<div class="empty-state">รีเฟรชข้อมูล... กรุณาเลือกวันที่อีกครั้ง</div>`;
    }

    fetchData();
</script>
</body>
</html>
