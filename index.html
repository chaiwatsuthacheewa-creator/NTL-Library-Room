<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTL Library Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ธีมสีเงิน (Metallic Silver) */
            --silver-bg: #e0e5ec;
            --silver-dark: #a3b1c6;
            --silver-light: #ffffff;
            
            /* สีข้อความ */
            --text-main: #2d3748;
            --text-muted: #718096;
            
            /* สีสถานะใหม่ */
            --color-free: #10b981;     /* เขียว: ว่าง */
            --color-booked: #ef4444;   /* แดง: จองแล้ว */
            --color-pending: #f59e0b;  /* เหลือง: รอตรวจสอบ */
        }
        
        body { 
            margin: 0; padding: 20px; 
            font-family: 'Kanit', sans-serif; 
            background: var(--silver-bg); 
            color: var(--text-main); 
        }
        
        /* สไตล์ปุ่มและกล่องแบบโลหะนูน (Neumorphism) */
        .metal-panel {
            background: var(--silver-bg);
            border-radius: 16px;
            box-shadow: 9px 9px 16px rgba(163,177,198,0.6), 
                       -9px -9px 16px rgba(255,255,255, 0.7);
            padding: 20px;
        }

        /* Header */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 25px; 
        }
        .title { 
            margin: 0; font-size: 26px; font-weight: 600; 
            color: #1a202c; letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-top: 5px; font-weight: 300; }
        
        /* Layout Grid */
        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; align-items: start; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        
        .panel-title { 
            color: #1a202c; font-size: 20px; margin-top: 0; 
            border-bottom: 2px solid var(--silver-dark); 
            padding-bottom: 10px; margin-bottom: 15px; 
        }

        /* Calendar */
        .calendar-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
        .day-header { text-align: center; color: var(--text-muted); font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        
        .day-card { 
            background: var(--silver-bg); 
            border-radius: 12px; padding: 12px; min-height: 80px; 
            cursor: pointer; transition: all 0.2s ease-in-out; 
            display: flex; flex-direction: column; justify-content: space-between;
            box-shadow: 5px 5px 10px rgba(163,177,198,0.4), 
                       -5px -5px 10px rgba(255,255,255, 0.8);
            border: 2px solid transparent;
        }
        .day-card:hover { transform: translateY(-3px); }
        .day-card:active {
            box-shadow: inset 5px 5px 10px rgba(163,177,198,0.4), 
                        inset -5px -5px 10px rgba(255,255,255, 0.8);
        }
        .day-num { font-size: 18px; font-weight: 600; color: #4a5568; }
        
        /* Status Colors */
        .status-text { font-size: 13px; text-align: right; font-weight: 600; }
        .state-empty { border-color: rgba(16, 185, 129, 0.3); } /* ขอบเขียวอ่อนๆ */
        .state-pending { border-color: rgba(245, 158, 11, 0.4); } /* ขอบเหลือง */
        .state-approved { border-color: rgba(239, 68, 68, 0.4); background: rgba(239, 68, 68, 0.05); } /* ขอบแดงพร้อมพื้นหลังจางๆ */

        /* Details List */
        .detail-item { 
            background: var(--silver-bg); padding: 15px; border-radius: 10px; margin-bottom: 12px; 
            box-shadow: inset 4px 4px 8px rgba(163,177,198,0.3), 
                        inset -4px -4px 8px rgba(255,255,255, 0.7);
            border-left: 4px solid transparent;
        }
        .detail-item.approved { border-left-color: var(--color-booked); }
        .detail-item.pending { border-left-color: var(--color-pending); }
        .empty-state { text-align: center; color: var(--text-muted); padding: 30px 0; font-style: italic; }

        /* Buttons & Inputs */
        .btn { 
            padding: 10px 18px; border-radius: 8px; border: none; font-family: 'Kanit'; 
            font-weight: 600; cursor: pointer; transition: 0.2s; letter-spacing: 0.5px;
            background: var(--silver-bg); color: var(--text-main);
            box-shadow: 4px 4px 8px rgba(163,177,198,0.5), -4px -4px 8px rgba(255,255,255, 0.8);
        }
        .btn:hover { color: #000; }
        .btn:active {
            box-shadow: inset 3px 3px 6px rgba(163,177,198,0.5), 
                        inset -3px -3px 6px rgba(255,255,255, 0.8);
        }
        .btn-primary { color: #2b6cb0; }
        .btn-danger { color: var(--color-booked); }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(45, 55, 72, 0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: var(--silver-bg); padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; box-shadow: 15px 15px 30px rgba(0,0,0,0.2); }
        input, select { 
            width: 100%; padding: 12px; margin: 8px 0 15px; border-radius: 8px; 
            border: none; background: var(--silver-bg); color: var(--text-main); font-family: 'Kanit';
            box-shadow: inset 4px 4px 8px rgba(163,177,198,0.4), 
                        inset -4px -4px 8px rgba(255,255,255, 0.8);
        }
        input:focus { outline: none; box-shadow: inset 4px 4px 8px rgba(163,177,198,0.6), inset -4px -4px 8px rgba(255,255,255, 1), 0 0 0 2px #cbd5e1; }
    </style>
</head>
<body>

<div class="header metal-panel">
    <div>
        <h1 class="title">⚙️ NTL LIBRARY FL.16</h1>
        <div class="subtitle">BSCS_GNR | EXT: 3262-3264 | <span id="connStatus" style="color:var(--color-free); font-weight:600;">ONLINE</span></div>
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div id="clock" style="font-size: 22px; color: #4a5568; font-weight: 600; letter-spacing: 1px;">00:00</div>
        <button class="btn btn-primary" onclick="openBooking()">+ จองห้อง</button>
        <button class="btn btn-danger" onclick="toggleAdmin()">🛡️ ADMIN</button>
    </div>
</div>

<div class="dashboard">
    <div class="metal-panel">
        <div class="calendar-header">
            <h2 class="panel-title" style="margin:0; border:none;" id="monthLabel">Loading...</h2>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="metal-panel">
        <h2 class="panel-title">รายละเอียดการใช้งาน</h2>
        <div id="selectedDateLabel" style="color: var(--text-muted); margin-bottom: 15px; font-size: 14px;">คลิกที่วันที่ในปฏิทินเพื่อดูข้อมูล</div>
        <div id="detailsContainer">
            <div class="empty-state">กรุณาเลือกวันที่</div>
        </div>
    </div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <h3 style="color: #2d3748; margin-top: 0; border-bottom: 2px solid #cbd5e1; padding-bottom: 10px;">แบบฟอร์มจองห้อง</h3>
        <label style="font-size: 14px; font-weight: 600; color: #4a5568;">วันที่:</label>
        <input type="date" id="formDate">
        
        <div style="display: flex; gap: 15px;">
            <div style="flex:1">
                <label style="font-size: 14px; font-weight: 600; color: #4a5568;">เริ่ม:</label>
                <input type="time" id="startTime" value="09:00">
            </div>
            <div style="flex:1">
                <label style="font-size: 14px; font-weight: 600; color: #4a5568;">ถึง:</label>
                <input type="time" id="stopTime" value="10:00">
            </div>
        </div>
        
        <label style="font-size: 14px; font-weight: 600; color: #4a5568;">หัวข้อ:</label>
        <input type="text" id="formSubject" placeholder="เช่น ประชุมสรุปโปรเจกต์">
        
        <label style="font-size: 14px; font-weight: 600; color: #4a5568;">รายละเอียด:</label>
        <input type="text" id="formDetail" placeholder="...">
        
        <label style="font-size: 14px; font-weight: 600; color: #4a5568;">ผู้จอง:</label>
        <input type="text" id="formUser" placeholder="ชื่อ-นามสกุล หรือ ทีม">
        
        <label style="font-size: 14px; font-weight: 600; color: #4a5568;">เบอร์โทร:</label>
        <input type="text" id="formPhone" placeholder="Ext. หรือ เบอร์มือถือ">
        
        <div style="display: flex; gap: 15px; margin-top: 15px;">
            <button class="btn btn-primary" style="flex: 2;" onclick="submitBooking()" id="submitBtn">ยืนยันการจอง</button>
            <button class="btn" style="flex: 1;" onclick="closeModal('bookingModal')">ยกเลิก</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "YOUR_APPS_SCRIPT_URL"; // *** ใส่ URL Google Apps Script ตรงนี้ ***
    let bookings = [];
    let isAdmin = false;

    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }, 1000);

    const dayNames = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];

    function renderCalendar() {
        const cal = document.getElementById('calendarGrid');
        cal.innerHTML = ''; 
        
        dayNames.forEach(d => { cal.innerHTML += `<div class="day-header">${d}</div>`; });

        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        
        document.getElementById('monthLabel').innerText = now.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
        
        const firstDayIndex = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        let blanks = '';
        for(let i = 0; i < firstDayIndex; i++) { blanks += `<div></div>`; }
        cal.innerHTML += blanks;

        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const dayData = bookings.filter(b => b.Date && b.Date.split('T')[0] === dateStr);
            
            // เปลี่ยน Logic ตรงนี้ให้สีเขียวคือค่าเริ่มต้น (ว่าง) และแดงคือจองแล้ว
            let cardClass = 'day-card state-empty';
            let statusHtml = `<div class="status-text" style="color: var(--color-free);">🟢 ว่าง</div>`;

            const hasApproved = dayData.some(d => d.Status === 'approved');
            const hasPending = dayData.some(d => d.Status === 'pending');

            if (hasApproved) { 
                cardClass = 'day-card state-approved'; 
                statusHtml = `<div class="status-text" style="color: var(--color-booked);">🔴 จองแล้ว</div>`;
            } else if (hasPending) { 
                cardClass = 'day-card state-pending'; 
                statusHtml = `<div class="status-text" style="color: var(--color-pending);">🟡 รอตรวจสอบ</div>`;
            }

            const card = document.createElement('div');
            card.className = cardClass;
            card.innerHTML = `
                <div class="day-num">${i}</div>
                ${statusHtml}
            `;
            card.onclick = () => showDetails(dateStr, dayData, i);
            cal.appendChild(card);
        }
    }

    async function fetchData() {
        try {
            document.getElementById('connStatus').innerText = "SYNCING...";
            document.getElementById('connStatus').style.color = "var(--color-pending)";
            
            const res = await fetch(API_URL);
            bookings = await res.json();
            
            renderCalendar();
            
            document.getElementById('connStatus').innerText = "ONLINE";
            document.getElementById('connStatus').style.color = "var(--color-free)";
        } catch (e) { 
            document.getElementById('connStatus').innerText = "OFFLINE";
            document.getElementById('connStatus').style.color = "var(--color-booked)";
        }
    }

    function showDetails(dateStr, dayData, dayNum) {
        const container = document.getElementById('detailsContainer');
        document.getElementById('selectedDateLabel').innerText = `ข้อมูลของวันที่: ${dayNum} ${document.getElementById('monthLabel').innerText}`;
        
        if (dayData.length === 0) {
            container.innerHTML = `<div class="empty-state">ไม่มีคิวการใช้งานในวันนี้<br><br><button class="btn btn-primary" onclick="openBookingWithDate('${dateStr}')">จองเวลานี้</button></div>`;
            return;
        }

        container.innerHTML = '';
        dayData.sort((a,b) => a['Start Time'].localeCompare(b['Start Time'])).forEach(b => {
            const statusColor = b.Status === 'approved' ? 'approved' : 'pending';
            const statusText = b.Status === 'approved' ? '<span style="color:var(--color-booked);">🔴 อนุมัติแล้ว</span>' : '<span style="color:var(--color-pending);">🟡 รออนุมัติ</span>';
            
            let adminBtns = '';
            if (isAdmin) {
                adminBtns = `
                <div style="margin-top: 15px; display:flex; gap:10px;">
                    <button class="btn" style="color:var(--color-booked); flex:1;" onclick="updateStatus('${b.ID}', 'approved')">APPROVE</button>
                    <button class="btn" style="color:var(--text-muted); flex:1;" onclick="updateStatus('${b.ID}', 'rejected')">REJECT</button>
                </div>`;
            }

            container.innerHTML += `
                <div class="detail-item ${statusColor}">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <strong style="color:#2b6cb0; font-size:16px;">${b['Start Time']} - ${b.StopTime}</strong>
                        <span style="font-size:13px; font-weight:600;">${statusText}</span>
                    </div>
                    <b style="color:#1a202c;">${b.Subject}</b><br>
                    <span style="color:var(--text-muted); font-size:13px;">โดย: ${b.User} (โทร: ${b.Phone.replace(/'/g,'')})</span>
                    ${adminBtns}
                </div>
            `;
        });
    }

    async function submitBooking() {
        const btn = document.getElementById('submitBtn');
        const data = {
            action: 'create',
            Date: document.getElementById('formDate').value,
            startTime: document.getElementById('startTime').value,
            stopTime: document.getElementById('stopTime').value,
            subject: document.getElementById('formSubject').value,
            detail: document.getElementById('formDetail').value,
            user: document.getElementById('formUser').value,
            phone: document.getElementById('formPhone').value
        };

        if (!data.Date || !data.subject || !data.user) return alert("โปรดกรอกข้อมูลสำคัญให้ครบถ้วน");

        btn.innerText = "กำลังบันทึก...";
        btn.disabled = true;

        try {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
            const result = await res.json();
            
            if (result.status === 'error') {
                alert(result.msg); 
            } else {
                alert("ส่งคำขอสำเร็จ! ระบบกำลังรอการยืนยัน");
                closeModal('bookingModal');
                fetchData(); 
            }
        } catch (e) { alert("Error: ขัดข้องในการส่งข้อมูล"); } 
        finally { btn.innerText = "ยืนยันการจอง"; btn.disabled = false; }
    }

    async function updateStatus(id, status) {
        if(!confirm(`ยืนยันการเปลี่ยนสถานะเป็น ${status.toUpperCase()}?`)) return;
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'update', id: id, status: status }) });
        fetchData();
        document.getElementById('detailsContainer').innerHTML = `<div class="empty-state">กำลังอัปเดตข้อมูล...</div>`;
    }

    function openBooking() { document.getElementById('bookingModal').style.display = 'flex'; }
    function openBookingWithDate(d) { document.getElementById('formDate').value = d; openBooking(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleAdmin() { 
        isAdmin = !isAdmin; 
        alert(isAdmin ? "SYS: ADMIN MODE ONLINE\nสามารถกด Approve/Reject ได้ที่แผงรายละเอียดด้านขวา" : "SYS: ADMIN MODE OFFLINE"); 
        document.getElementById('detailsContainer').innerHTML = `<div class="empty-state">รีเฟรชโหมดแอดมิน... กรุณาเลือกวันที่อีกครั้ง</div>`;
    }

    renderCalendar(); 
    fetchData();      
</script>
</body>
</html>
