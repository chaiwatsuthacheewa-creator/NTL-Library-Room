<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTL Library Room FL.16</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --accent: #22d3ee; --bg: #0f172a; --card: #1e293b; }
        body { margin: 0; font-family: 'Kanit', sans-serif; background: var(--bg); color: #f1f5f9; }
        
        /* Header & Stats */
        .header { padding: 2rem; background: linear-gradient(135deg, var(--primary), var(--accent)); color: #000; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .top { display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 24px; font-weight: 600; margin: 0; }
        .contact-bar { font-size: 14px; opacity: 0.8; margin-top: 5px; }
        
        /* Calendar Grid */
        .calendar-container { padding: 20px; max-width: 1200px; margin: auto; }
        .calendar { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .day-card { background: var(--card); padding: 15px; border-radius: 12px; transition: 0.3s; cursor: pointer; border: 1px solid #334155; position: relative; }
        .day-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .day-num { font-size: 20px; font-weight: 600; }
        
        /* Status Tags */
        .status-tag { margin-top: 10px; padding: 4px 8px; border-radius: 6px; font-size: 12px; text-align: center; font-weight: 500; }
        .status-free { background: #059669; color: white; }
        .status-busy { background: #e11d48; color: white; }
        .status-pending { background: #ca8a04; color: white; }

        /* Modal Customization */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); z-index: 100; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid #475569; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .btn-close { background: #475569; }
        .btn-approve { background: #059669; }
        .btn-reject { background: #e11d48; }

        .nav-btn { padding: 8px 16px; border-radius: 8px; background: rgba(255,255,255,0.2); color: black; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="header">
    <div class="top">
        <div>
            <h1 class="title">📊 NTL Library FL.16</h1>
            <div class="contact-bar">📧 BSCS_GNR | 📞 3262-3264</div>
        </div>
        <div style="text-align: right;">
            <div id="clock" style="font-weight: 600; margin-bottom: 8px;">00:00:00</div>
            <button class="nav-btn" onclick="openBooking()">➕ จองห้อง</button>
            <button class="nav-btn" onclick="toggleAdmin()">🛡️ Admin</button>
        </div>
    </div>
    <h3 id="monthLabel" style="margin-top: 20px; margin-bottom: 0;"></h3>
</div>

<div class="calendar-container">
    <div id="calendar" class="calendar"></div>
</div>

<div id="bookingModal" class="modal">
    <div class="modal-content">
        <h3>📝 ข้อมูลการจอง</h3>
        <input type="date" id="formDate">
        <input type="text" id="formSubject" placeholder="หัวข้อการประชุม">
        <input type="text" id="formDetail" placeholder="รายละเอียด">
        <input type="text" id="formUser" placeholder="ชื่อผู้จอง">
        <input type="text" id="formPhone" placeholder="เบอร์โทรศัพท์">
        <button onclick="submitBooking()">ยืนยันการจอง</button>
        <button class="btn-close" onclick="closeModal('bookingModal')">ยกเลิก</button>
    </div>
</div>

<div id="adminModal" class="modal">
    <div class="modal-content">
        <h3>🛡️ จัดการการจอง</h3>
        <div id="adminInfo" style="margin-bottom: 15px; line-height: 1.6;"></div>
        <button class="btn-approve" onclick="updateStatus('approved')">อนุมัติ (Approve)</button>
        <button class="btn-reject" onclick="updateStatus('rejected')">ปฏิเสธ (Reject)</button>
        <button class="btn-close" onclick="closeModal('adminModal')">ปิด</button>
    </div>
</div>

<script>
    const API_URL = "YOUR_APPS_SCRIPT_URL"; // *** สำคัญ: นำ URL จากการ Deploy มาวางตรงนี้ ***
    let bookings = [];
    let isAdmin = false;
    let selectedBookingId = null;

    // ระบบเวลา
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH');
    }, 1000);

    // ดึงข้อมูล
    async function fetchData() {
        try {
            const res = await fetch(API_URL);
            bookings = await res.json();
            renderCalendar();
        } catch (e) { console.log("Offline or Error"); }
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        cal.innerHTML = '';
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth();
        
        document.getElementById('monthLabel').innerText = now.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
        
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const dayData = bookings.filter(b => b.Date.split('T')[0] === dateStr);
            
            // ตรวจสอบสถานะ
            const hasApproved = dayData.some(d => d.Status === 'approved');
            const hasPending = dayData.some(d => d.Status === 'pending');

            let statusClass = 'status-free';
            let statusText = 'ว่าง';

            if (hasApproved) { statusClass = 'status-busy'; statusText = 'จองแล้ว'; }
            else if (hasPending) { statusClass = 'status-pending'; statusText = 'รออนุมัติ'; }

            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div class="day-num">${i}</div>
                <div class="status-tag ${statusClass}">${statusText}</div>
            `;
            card.onclick = () => handleDayClick(dateStr, dayData);
            cal.appendChild(card);
        }
    }

    function handleDayClick(date, dayData) {
        if (!isAdmin) {
            if (dayData.length > 0) {
                alert(`วันที่ ${date}:\n${dayData.map(d => `- ${d.Subject} (${d.Status})`).join('\n')}`);
            }
        } else {
            if (dayData.length > 0) {
                const b = dayData[0]; // ตัวอย่างการเลือกคิวแรกมาจัดการ
                selectedBookingId = b.ID;
                document.getElementById('adminInfo').innerHTML = `
                    <b>ผู้จอง:</b> ${b.User}<br>
                    <b>เรื่อง:</b> ${b.Subject}<br>
                    <b>เบอร์:</b> ${b.Phone}<br>
                    <b>สถานะปัจจุบัน:</b> ${b.Status}
                `;
                document.getElementById('adminModal').style.display = 'flex';
            }
        }
    }

    async function submitBooking() {
        const data = {
            action: 'create',
            Date: document.getElementById('formDate').value,
            subject: document.getElementById('formSubject').value,
            detail: document.getElementById('formDetail').value,
            user: document.getElementById('formUser').value,
            phone: document.getElementById('formPhone').value
        };

        if (!data.Date || !data.user) return alert("กรุณากรอกวันที่และชื่อผู้จอง");

        await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
        alert("ส่งคำขอเรียบร้อย");
        closeModal('bookingModal');
        fetchData();
    }

    async function updateStatus(status) {
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'update', id: selectedBookingId, status: status })
        });
        closeModal('adminModal');
        fetchData();
    }

    function openBooking() { document.getElementById('bookingModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleAdmin() { 
        isAdmin = !isAdmin; 
        alert(isAdmin ? "โหมดผู้ดูแลระบบ: เปิด (คลิกที่วันที่จองเพื่อ Manage)" : "โหมดผู้ดูแลระบบ: ปิด"); 
    }

    fetchData();
</script>
</body>
</html>
