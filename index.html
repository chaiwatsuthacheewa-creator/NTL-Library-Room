<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NTL Library Room FL.16</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Kanit';background:linear-gradient(135deg,#1e293b,#312e81);color:#e2e8f0}
.header{background:linear-gradient(135deg,#6366f1,#22d3ee);padding:16px 20px;display:flex;justify-content:space-between}
.connection{font-size:12px;padding:4px 10px;border-radius:999px;background:#fca5a5}
.connected{background:#86efac}
.container{padding:20px;display:grid;gap:20px}
.card{background:rgba(255,255,255,0.08);border-radius:20px;padding:18px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
.day{background:rgba(255,255,255,0.06);border-radius:16px;padding:12px;min-height:120px}
.today{border:2px solid #67e8f9}
.status{display:inline-block;padding:4px 8px;border-radius:12px;font-size:11px;margin-top:4px}
.full{background:#fca5a5}
.available{background:#bbf7d0}
button{padding:8px 10px;border:none;border-radius:10px;background:#818cf8;color:#fff}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center}
.modal-content{background:#1e293b;padding:20px;border-radius:16px;width:90%;max-width:400px}
.close-btn{position:absolute;top:10px;right:10px}
input,select,textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:10px;border:none;background:#0f172a;color:#fff}
.table{width:100%;border-collapse:collapse}
.table td,.table th{padding:8px;border-bottom:1px solid rgba(255,255,255,0.1)}
</style>
</head>

<body>

<div class="header">
  <div>📚 NTL Library Dashboard</div>
  <span id="conn" class="connection">Offline</span>
</div>

<div class="container">

<div class="card">
  <div id="monthTitle"></div>
  <div id="calendar" class="calendar"></div>
</div>

<div class="card">
  <button onclick="openBooking()">จองห้อง</button>
</div>

<div class="card">
  <canvas id="usageChart"></canvas>
</div>

<div class="card">
  <table class="table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Time</th>
        <th>Subject</th>
        <th>User</th>
      </tr>
    </thead>
    <tbody id="bookingList"></tbody>
  </table>
</div>

</div>

<div class="modal" id="bookingModal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal('bookingModal')">❌</button>

    <!-- Date -->
    <input type="date" id="date">

    <!-- Start Time -->
    <input type="time" id="startTime">

    <!-- Stop Time -->
    <input type="time" id="stopTime">

    <!-- Subject -->
    <input id="subject" placeholder="Subject">

    <!-- Detail -->
    <textarea id="detail" placeholder="Detail"></textarea>

    <!-- User -->
    <input id="user" placeholder="User">

    <button onclick="submitBooking()">บันทึก</button>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
let GAS_URL="https://script.google.com/macros/s/AKfycbygxGQFKzGd8yJcd7j4DLFCNzAZjyNY3FIJGXradQWGHQT5uUVDRP0SFqHnZSH8-Pt8/exec";
let data=[];
let chart;

/* ===== FETCH DATA FROM GOOGLE SHEET ===== */
async function fetchData(){
  try{
    const res=await fetch(GAS_URL);
    data=await res.json();

    document.getElementById('conn').innerText='Online';
    document.getElementById('conn').classList.add('connected');

    renderAll();
  }catch(e){
    document.getElementById('conn').innerText='Offline';
  }
}

/* ===== CALENDAR ===== */
function renderCalendar(){
  const cal=document.getElementById('calendar');
  cal.innerHTML='';

  const now=new Date();
  const start=new Date(now.getFullYear(),now.getMonth(),1);

  document.getElementById('monthTitle').innerText=
    start.toLocaleString('th-TH',{month:'long',year:'numeric'});

  for(let i=0;i<30;i++){
    const d=new Date(start);
    d.setDate(start.getDate()+i);

    const dateStr=d.toISOString().split('T')[0];

    // ⚠️ เปลี่ยนให้ตรง Google Sheet (Date)
    const dayData=data.filter(x=>x["Date"]===dateStr);

    let html='';

    if(dayData.length===0){
      html="<div class='status available'>ว่าง</div>";
    }else{
      html="<div class='status full'>มีจอง</div>";
    }

    cal.innerHTML+=`<div class='day'>${d.getDate()}${html}</div>`;
  }
}

/* ===== CHART ===== */
function renderChart(){
  const days=[...Array(30)].map((_,i)=>i+1);

  const usage=days.map(d=>
    data.filter(x=>x["Date"].endsWith(String(d).padStart(2,'0'))).length
  );

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById('usageChart'),{
    type:'line',
    data:{labels:days,datasets:[{data:usage}]}
  });
}

/* ===== LIST ===== */
function renderList(){
  const el=document.getElementById('bookingList');
  el.innerHTML='';

  data.forEach(d=>{
    el.innerHTML+=`
      <tr>
        <td>${d["Date"]}</td>
        <td>${d["Start Time"]} - ${d["StopTime"]}</td>
        <td>${d["Subject"]}</td>
        <td>${d["User"]}</td>
      </tr>`;
  });
}

/* ===== SUBMIT BOOKING TO GOOGLE SHEET ===== */
function submitBooking(){
  fetch(GAS_URL,{
    method:'POST',
    body:JSON.stringify({
      action:'create',
      date:date.value,
      startTime:startTime.value,
      stopTime:stopTime.value,
      subject:subject.value,
      detail:detail.value,
      user:user.value
    })
  });

  closeModal('bookingModal');
  setTimeout(fetchData,500);
}

/* ===== UI CONTROL ===== */
function openBooking(){document.getElementById('bookingModal').style.display='flex'}
function closeModal(id){document.getElementById(id).style.display='none'}

/* ===== INIT ===== */
fetchData();
setInterval(fetchData,5000);

function renderAll(){renderCalendar();renderList();renderChart();}
</script>

</body>
</html>
