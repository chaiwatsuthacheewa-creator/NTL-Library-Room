<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NTL Library Room FL.16</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=IBM+Plex+Thai:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Kanit','IBM Plex Thai',sans-serif;background:radial-gradient(circle at top,#0b1220,#0f172a);color:#e2e8f0}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:linear-gradient(135deg,#22d3ee,#6366f1)}
.header-right{display:flex;gap:8px;flex-wrap:wrap}
button{padding:8px 12px;border:none;border-radius:10px;background:#6366f1;color:#fff;cursor:pointer}
.container{padding:16px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
@media(max-width:600px){.calendar{grid-template-columns:repeat(3,1fr)}}
.day{background:#020617;border-radius:14px;padding:10px;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer;transition:.25s}
.today{border:2px solid #22d3ee;box-shadow:0 0 12px #22d3ee}
.week{font-size:10px;color:#94a3b8}
.date{font-weight:600}
.status{font-size:11px;padding:4px;border-radius:8px;margin-top:4px;text-align:center}
.available{background:#00ffa6;color:#000}
.pending{background:#fb923c;color:#000}
.partial{background:#facc15;color:#000}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,.7)}
.modal-box{background:#020617;padding:18px;border-radius:14px;width:90%;max-width:380px;position:relative}
.close{position:absolute;right:10px;top:10px;background:#ef4444;padding:4px 8px;border-radius:6px}
input,select{width:100%;padding:10px;margin-bottom:10px;border:none;border-radius:8px;background:#1e293b;color:#fff}
.success{background:#22c55e;padding:10px;border-radius:10px;text-align:center}
</style>
</head>
<body>

<div class="header">
  <div>📚 NTL Library Dashboard</div>
  <div class="header-right">
    <div id="clock"></div>
    <div id="conn" style="padding:4px 8px;border-radius:8px;background:#ef4444">Offline</div>
    <button onclick="openBooking()">📌 จอง</button>
    <button onclick="openLogin()">🔐 Admin</button>
  </div>
</div>

<div class="container">
  <div id="calendar" class="calendar"></div>
</div>

<!-- BOOKING -->
<div id="bookingModal" class="modal"><div class="modal-box">
  <button class="close" onclick="closeModal('bookingModal')">❌</button>
  <h3>📚 จองห้องสมุด</h3>
  <input id="date" type="date">
  <select id="timeSlot">
    <option value="08:00-12:00">เช้า (08:00 - 12:00)</option>
    <option value="13:00-18:00">บ่าย (13:00 - 18:00)</option>
    <option value="08:00-18:00">ทั้งวัน (08:00 - 18:00)</option>
  </select>
  <input id="meeting" placeholder="หัวข้อประชุม">
  <input id="userName" placeholder="ชื่อผู้จอง">
  <input id="phone" placeholder="เบอร์ติดต่อ">
  <button onclick="submitBooking()">บันทึก</button>
</div></div>

<!-- SUCCESS -->
<div id="successModal" class="modal"><div class="modal-box">
  <div class="success">✅ บันทึกเสร็จสิ้นแล้ว</div>
</div></div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbx_Nop30QZjN6yMa8SzjhUrzMCaHD8qKqodsSumGlBv2dnEIWMsH8OYZZ-K9-k68GFh/exec";
let data=[];

// 🕒 Clock Thailand
setInterval(()=>{
 document.getElementById('clock').innerText=new Date().toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok'});
},1000);

function setConnection(s){
 conn.innerText=s?'Online':'Offline';
 conn.style.background=s?'#22c55e':'#ef4444';
}

function closeAll(){
 document.querySelectorAll('.modal').forEach(m=>m.style.display='none');
}

async function fetchData(){
 try{
  const res=await fetch(GAS_URL+'?t='+Date.now());
  data=await res.json();
  setConnection(true);
  renderCalendar();
 }catch(e){setConnection(false)}
}

function formatDate(d){
 if(d.includes('/')){
  const [day,month,year]=d.split('/');
  return `${year}-${month.padStart(2,'0')}-${day.padStart(2,'0')}`;
 }
 return d;
}

function renderCalendar(){
 calendar.innerHTML='';
 const now=new Date();
 const start=new Date(now.getFullYear(),now.getMonth(),1);

 for(let i=0;i<30;i++){
  const d=new Date(start);
  d.setDate(i+1);
  const dateStr=d.toISOString().split('T')[0];

  const dayData=data.filter(x=>formatDate(x.Date)===dateStr);

  const am=dayData.find(x=>x['Start Time']==='08:00');
  const pm=dayData.find(x=>x['Start Time']==='13:00');

  const amCls=am?(am.Status==='Approved'?'partial':'pending'):'available';
  const pmCls=pm?(pm.Status==='Approved'?'partial':'pending'):'available';

  calendar.innerHTML+=`<div class="day">
    <div class="week">${d.toLocaleDateString('th-TH',{weekday:'short'})}</div>
    <div class="date">${d.getDate()}</div>
    <div class="status ${amCls}">เช้า</div>
    <div class="status ${pmCls}">บ่าย</div>
  </div>`;
 }
}

function openBooking(){closeAll();bookingModal.style.display='flex'}

async function submitBooking(){
 closeAll();
 const [start,stop]=timeSlot.value.split('-');

 await fetch(GAS_URL,{method:'POST',body:JSON.stringify({
  action:'create',
  data:{
    Date:new Date(date.value).toLocaleDateString('en-GB'),
    'Start Time':start,
    StopTime:stop,
    subject:meeting.value,
    user:userName.value,
    phone:phone.value
  }
 })});

 successModal.style.display='flex';
 setTimeout(()=>closeModal('successModal'),1500);
 fetchData();
}

function closeModal(id){document.getElementById(id).style.display='none'}

renderCalendar();
fetchData();
</script>
</body>
</html>
