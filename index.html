<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NTL Library Room FL.16</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=IBM+Plex+Thai:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Kanit','IBM Plex Thai',sans-serif;background:radial-gradient(circle at top,#0b1220,#0f172a);color:#e2e8f0}
.header{display:flex;flex-direction:column;gap:6px;padding:14px 16px;background:linear-gradient(135deg,#22d3ee,#6366f1)}
.header-top{display:flex;justify-content:space-between;align-items:center}
.title{font-size:20px;font-weight:600;color:#000}
.sub{font-size:13px;opacity:.9}
.contact{font-size:12px;color:#000}
.header-right{display:flex;gap:8px}
button{padding:8px 12px;border:none;border-radius:10px;background:#6366f1;color:#fff;cursor:pointer}
.container{padding:16px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.day{background:#020617;border-radius:14px;padding:10px;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}
.week{font-size:10px;color:#94a3b8}
.date{font-weight:600}
.status{font-size:11px;padding:4px;border-radius:8px;margin-top:4px;text-align:center}
.available{background:#00ffa6;color:#000}
.pending{background:#fb923c;color:#000}
.partial{background:#facc15;color:#000}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,.7)}
.modal-box{background:#020617;padding:18px;border-radius:14px;width:90%;max-width:380px;position:relative}
.close{position:absolute;right:10px;top:10px;background:#ef4444;padding:4px 8px;border-radius:6px}
input,select{width:100%;padding:10px;margin-bottom:10px;border:none;border-radius:8px;background:#1e293b;color:#fff}
.success{background:#22c55e;padding:10px;border-radius:10px;text-align:center}
.conn{font-size:12px;padding:4px 8px;border-radius:8px;background:#ef4444}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="title">📊 ข้อมูลการใช้งานห้องสมุด</div>
      <div class="contact">Mail : BSCS_GNR | Tel : 3262-3264</div>
    </div>
    <div class="header-right">
      <div id="clock"></div>
      <div id="conn" class="conn">Offline</div>
      <button onclick="openBooking()">📌 จอง</button>
      <button onclick="openLogin()">🔐 Admin</button>
      <button onclick="goHome()">🏠 กลับเมนู</button>
    </div>
  </div>
  <div id="monthLabel" class="sub"></div>
</div>

<div class="container">
  <div id="calendar" class="calendar"></div>
</div>

<!-- SUCCESS -->
<div id="successModal" class="modal"><div class="modal-box"><div id="successText" class="success"></div></div></div>

<!-- LOGIN -->
<div id="loginModal" class="modal"><div class="modal-box">
  <button class="close" onclick="closeModal('loginModal')">❌</button>
  <h3>Admin Login</h3>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div></div>

<!-- ADMIN -->
<div id="adminModal" class="modal"><div class="modal-box">
  <button class="close" onclick="closeModal('adminModal')">❌</button>
  <div id="adminDetail"></div>
  <button onclick="updateStatus('approved')">Approve</button>
  <button onclick="updateStatus('rejected')">Reject</button>
  <button onclick="updateStatus('cancel')">Cancel</button>
</div></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbx_Nop30QZjN6yMa8SzjhUrzMCaHD8qKqodsSumGlBv2dnEIWMsH8OYZZ-K9-k68GFh/exec";
let data = [];
let isAdmin = false;
let currentID = null;

const ADMINS = [{u:'admin1',p:'1111'},{u:'admin2',p:'2222'}];

setInterval(()=>{
 document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok'});
},1000);

function setConn(status){
 const el=document.getElementById('conn');
 el.innerText=status?'Online':'Offline';
 el.style.background=status?'#22c55e':'#ef4444';
}

function showSuccess(msg){
 document.getElementById('successText').innerText=msg;
 document.getElementById('successModal').style.display='flex';
 setTimeout(()=>closeModal('successModal'),1500);
}

function formatDate(d){
 const dt=new Date(d);
 return dt.toISOString().split('T')[0];
}

async function fetchData(){
 try{
  const res=await fetch(GAS_URL+'?t='+Date.now());
  data=await res.json();
  setConn(true);
  renderCalendar();
 }catch(e){setConn(false)}
}

function renderCalendar(){
 const cal=document.getElementById('calendar');
 cal.innerHTML='';

 const now=new Date();
 const year=now.getFullYear();
 const month=now.getMonth();

 document.getElementById('monthLabel').innerText=`ข้อมูลการใช้งานห้องสมุด ประจำเดือน ${now.toLocaleDateString('th-TH',{month:'long',year:'numeric'})}`;

 const days=new Date(year,month+1,0).getDate();

 for(let i=1;i<=days;i++){
  const d=new Date(year,month,i);
  const dateStr=d.toISOString().split('T')[0];

  const dayData=data.filter(x=>formatDate(x.Date)===dateStr);

  const am=dayData.find(x=>x['Start Time']?.toString().startsWith('08') && x.Status?.toLowerCase()==='approved');
  const pm=dayData.find(x=>x['Start Time']?.toString().startsWith('13') && x.Status?.toLowerCase()==='approved');

  const amCls=am?'partial':'available';
  const pmCls=pm?'partial':'available';

  cal.innerHTML+=`<div class="day" onclick="openDay('${dateStr}')">
    <div class="week">${d.toLocaleDateString('th-TH',{weekday:'short'})}</div>
    <div class="date">${i}</div>
    <div class="status ${amCls}">เช้า</div>
    <div class="status ${pmCls}">บ่าย</div>
  </div>`;
 }
}

function openDay(date){
 const list=data.filter(d=>formatDate(d.Date)===date);
 if(list.length===0) return;
 currentID=list[0].ID;
 const d=list[0];
 if(isAdmin){
  document.getElementById('adminDetail').innerHTML=`
  📅 ${d.Date}<br>
  ⏰ ${d['Start Time']} - ${d.StopTime}<br>
  📌 ${d.subject}<br>
  📝 ${d.detail}<br>
  👤 ${d.user}<br>
  📞 ${d.phone}<br>
  📊 ${d.Status}
  `;
  document.getElementById('adminModal').style.display='flex';
 }
}

function openLogin(){document.getElementById('loginModal').style.display='flex'}

function login(){
 const u=document.getElementById('user').value;
 const p=document.getElementById('pass').value;
 if(ADMINS.find(a=>a.u===u&&a.p===p)){
  isAdmin=true;
  closeModal('loginModal');
 }
}

async function updateStatus(status){
 await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'update',data:{ID:currentID},status})});
 closeModal('adminModal');
 showSuccess(status.toUpperCase()+' สำเร็จ');
 fetchData();
}

function goHome(){
 alert('ใส่ลิงก์เมนูหลักภายหลัง');
}

function closeModal(id){document.getElementById(id).style.display='none'}

renderCalendar();
fetchData();
setInterval(fetchData,5000);
</script>
</body>
</html>
